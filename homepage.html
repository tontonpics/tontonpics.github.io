<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arnaud SCHEID - Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation principale */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 60px;
            flex-grow: 1;
        }

        /* Logo/Titre à gauche */
        .logo {
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            color: #000;
            transition: opacity 0.3s;
        }

        .logo:hover {
            opacity: 0.7;
        }

        /* Menu à droite */
        .menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: right;
        }

        .menu-item {
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            color: #000;
            transition: opacity 0.3s;
        }

        .menu-item:hover {
            opacity: 0.7;
        }

        /* Carousel au centre */
        .carousel-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 2;
            margin-bottom: 60px;
        }

        .carousel {
            position: relative;
            width: 500px;
            height: 400px;
            background-color: #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .carousel-slide {
            display: none;
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: fadeIn 0.5s;
        }

        .carousel-slide.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Pied de page */
        .footer {
            display: flex;
            justify-content: space-between;
            padding: 30px 60px 40px;
        }

        .footer-item {
            cursor: pointer;
            text-decoration: none;
            color: #000;
            font-size: 14px;
            transition: opacity 0.3s;
        }

        .footer-item:hover {
            opacity: 0.7;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                padding: 30px 20px;
            }

            .carousel {
                width: 300px;
                height: 250px;
            }

            .footer {
                padding: 20px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation principale -->
    <div class="navbar">
        <a href="homepage.html" class="logo">Arnaud SCHEID</a>
        
        <div class="menu">
            <a href="editorial.html" class="menu-item">EDITORIAL</a>
            <a href="personal.html" class="menu-item">PERSONAL</a>
        </div>
    </div>

    <!-- Carousel -->
    <div class="carousel-container">
        <div class="carousel">
            <img src="https://via.placeholder.com/500x400?text=Image+1" alt="Slide 1" class="carousel-slide active">
            <img src="https://via.placeholder.com/500x400?text=Image+2" alt="Slide 2" class="carousel-slide">
            <img src="https://via.placeholder.com/500x400?text=Image+3" alt="Slide 3" class="carousel-slide">
            <img src="https://via.placeholder.com/500x400?text=Image+4" alt="Slide 4" class="carousel-slide">
        </div>
    </div>

    <!-- Pied de page -->
    <div class="footer">
        <a href="mailto:contact@arnaudscheid.com" class="footer-item">CONTACT</a>
        <a href="https://www.instagram.com/arnaudscheid/" target="_blank" class="footer-item">INSTAGRAM</a>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.carousel-slide');
        const totalSlides = slides.length;

        function showSlide(n) {
            slides.forEach(slide => slide.classList.remove('active'));
            slides[n % totalSlides].classList.add('active');
        }

        function nextSlide() {
            currentSlide++;
            showSlide(currentSlide);
        }

        // Change d'image toutes les 5 secondes
        setInterval(nextSlide, 5000);
    </script>
</body>
</html>
